{% extends "base.html" %}
{% block content %}
<h2>Upload Video</h2>
<form method="POST" enctype="multipart/form-data">
  <input type="text" name="title" placeholder="Title" required><br>
  <textarea name="description" placeholder="Description"></textarea><br>
  <input type="number" name="duration" placeholder="Duration (minutes)"><br>
  <select name="category">
    <option value="syllabus">Syllabus (Free)</option>
    <option value="premium">Premium (Paid)</option>
  </select><br>
  <input type="number" name="price" placeholder="Price (if premium)" step="0.01"><br>
  <input type="file" name="video" accept="video/*" required><br>
  <button type="submit">Upload</button>
</form>
{% endblock %}
